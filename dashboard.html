<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>系统化事项驾驶舱</title>
  <style>
    :root {
      --bg: #f5f6f4;
      --panel: #ffffff;
      --ink: #18201d;
      --muted: #65716c;
      --line: #d9dfdb;
      --soft: #eef2ef;
      --green: #12715f;
      --green-2: #dcefe8;
      --blue: #2563a8;
      --blue-2: #e3edf8;
      --amber: #a16012;
      --amber-2: #fff1d6;
      --red: #b3382c;
      --red-2: #f8e1de;
      --shadow: 0 10px 26px rgba(28, 39, 34, .08);
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }
    button, textarea, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      max-width: 100vw;
      overflow-x: hidden;
      padding-bottom: calc(104px + env(safe-area-inset-bottom));
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(217, 223, 219, .9);
      background: rgba(245, 246, 244, .94);
      backdrop-filter: blur(14px);
    }

    .top {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 14px 10px;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .brand > div:first-child { min-width: 0; }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 20px; line-height: 1.2; }
    h2 { font-size: 17px; line-height: 1.3; }
    h3 { font-size: 15px; line-height: 1.35; }
    p, .small { color: var(--muted); font-size: 13px; line-height: 1.55; }
    h1, h2, h3, p, .small { overflow-wrap: anywhere; }

    .tabs {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .tab {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      min-width: 0;
    }

    .tab.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
      font-weight: 800;
    }

    main {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px;
      min-width: 0;
    }

    .view { display: none; }
    .view.active { display: grid; gap: 14px; }
    .grid { display: grid; gap: 12px; }
    @media (min-width: 820px) {
      .grid.two { grid-template-columns: 1.05fr .95fr; }
    }

    .panel, .card {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel { overflow: hidden; }
    .panel-head {
      padding: 13px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .panel-body { padding: 13px; display: grid; gap: 12px; }
    .card { padding: 13px; display: grid; gap: 10px; box-shadow: none; }

    .hero {
      display: grid;
      gap: 12px;
      padding: 14px;
      background:
        linear-gradient(110deg, rgba(18, 113, 95, .09), rgba(37, 99, 168, .07)),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 12px;
      align-items: center;
    }
    .hero-top > div { min-width: 0; }

    .ring {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) var(--angle), #dfe6e2 0);
      position: relative;
    }
    .ring::after {
      content: "";
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--panel);
    }
    .ring strong {
      position: relative;
      z-index: 1;
      font-size: 18px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .kpi {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 8px;
      background: rgba(255, 255, 255, .72);
    }
    .kpi strong { display: block; font-size: 18px; }
    .kpi span { color: var(--muted); font-size: 12px; line-height: 1.35; }

    .step-list { display: grid; gap: 9px; }
    .step {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .step > div { min-width: 0; }
    .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--green);
      font-size: 12px;
      font-weight: 800;
    }
    .step.pending .dot { background: #c5ccc8; color: #44504b; }
    .step.active { border-color: #99cabd; background: #f2faf7; }
    .step-title { font-weight: 800; font-size: 14px; }
    .step-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }
    .chip.green { background: var(--green-2); color: var(--green); border-color: #b9d9cd; }
    .chip.blue { background: var(--blue-2); color: var(--blue); border-color: #c5d7ef; }
    .chip.amber { background: var(--amber-2); color: var(--amber); border-color: #efd29f; }
    .chip.red { background: var(--red-2); color: var(--red); border-color: #efbeb8; }

    textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 11px;
    }
    textarea { min-height: 138px; line-height: 1.55; resize: vertical; }

    .primary, .secondary, .icon-btn {
      border-radius: 8px;
      min-height: 40px;
      padding: 9px 12px;
    }
    .primary {
      border: 0;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }
    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }
    .icon-btn {
      border: 1px solid var(--line);
      background: #fff;
      min-width: 40px;
      padding: 0;
      font-weight: 900;
    }

    .record {
      display: grid;
      gap: 9px;
      border-left: 4px solid var(--green);
    }
    .record.raw { border-left-color: var(--muted); }
    .record.note { border-left-color: var(--blue); }
    .record.plan { border-left-color: var(--green); }
    .record.risk { border-left-color: var(--red); }
    .record.idea { border-left-color: var(--amber); }
    .record-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .record-title > div { min-width: 0; }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 16px;
      color: var(--muted);
      background: #fff;
      line-height: 1.6;
      font-size: 13px;
    }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    .bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(14px);
    }
    .bottom-inner {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 10px 14px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(96px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      max-width: calc(100vw - 28px);
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--ink);
      color: #fff;
      font-size: 13px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; }

    @media (max-width: 520px) {
      .top, main, .bottom-inner { max-width: 390px; }
      .top { padding: 12px 12px 9px; }
      main { padding: 12px; }
      h1 { font-size: 18px; }
      .hero-top { grid-template-columns: 76px 1fr; }
      .ring { width: 76px; height: 76px; }
      .ring::after { width: 56px; height: 56px; }
      .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .kpi strong { font-size: 16px; }
      .tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
      .tab { font-size: 12px; padding: 6px 4px; }
      #projectLabel { display: none; }
      .bottom-inner { grid-template-columns: 1fr; }
      .bottom-inner .primary { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top">
        <div class="brand">
          <div>
            <h1>系统化事项驾驶舱</h1>
            <p>适合求职、副业、项目推进、学习计划这类需要持续整理的事情。</p>
          </div>
          <div class="chip green" id="projectLabel">求职 / 副业 / 项目</div>
        </div>
        <nav class="tabs" aria-label="视图切换">
          <button class="tab active" data-view="dash">驾驶舱</button>
          <button class="tab" data-view="capture">记录</button>
          <button class="tab" data-view="ai">AI整理</button>
        </nav>
      </div>
    </header>

    <main>
      <section class="view active" id="view-dash">
        <article class="hero">
          <div class="hero-top">
            <div class="ring" id="progressRing" style="--angle: 0deg"><strong id="progressText">0%</strong></div>
            <div>
              <h2 id="currentGoal">当前进度：初始化</h2>
              <p id="currentSummary">点开阶段看说明。你只需要不断记录，系统负责把它压缩成可执行状态。</p>
            </div>
          </div>
          <div class="kpis">
            <div class="kpi"><strong id="noteCount">0</strong><span>历史记录</span></div>
            <div class="kpi"><strong id="actionCount">0</strong><span>待做事项</span></div>
            <div class="kpi"><strong id="stageCount">0</strong><span>当前阶段</span></div>
          </div>
        </article>

        <div class="grid two">
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>阶段说明</h2>
                <p>点击当前阶段，展开你应该做什么。</p>
              </div>
            </div>
            <div class="panel-body">
              <div class="step-list" id="stageList"></div>
            </div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <div>
                <h2>当前重点</h2>
                <p>只保留最该看的 3 条。</p>
              </div>
            </div>
            <div class="panel-body" id="focusList"></div>
          </article>
        </div>
      </section>

      <section class="view" id="view-capture">
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>记录</h2>
              <p>一个输入框就够了。写什么都行。</p>
            </div>
            <button class="secondary" id="clearAll">清空</button>
          </div>
          <div class="panel-body">
            <form id="noteForm" class="grid">
              <textarea id="noteText" placeholder="比如：我在找什么岗位 / 我看到的项目 / 我想到的判断 / 我现在卡住的地方 / 下一步想做什么。"></textarea>
              <button class="primary" type="submit">保存成卡片</button>
            </form>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>历史卡片</h2>
              <p>所有记录都在这里。</p>
            </div>
          </div>
          <div class="panel-body" id="recordList"></div>
        </article>
      </section>

      <section class="view" id="view-ai">
        <article class="panel">
          <div class="panel-head">
            <div>
              <h2>AI整理</h2>
              <p>把你的乱记录丢给模型，让它按固定框架总结。</p>
            </div>
            <button class="secondary" id="copyPrompt">复制提示词</button>
          </div>
          <div class="panel-body">
            <div class="card">
              <h3>建议输出</h3>
              <div class="chips">
                <span class="chip green">当前进度</span>
                <span class="chip blue">已确定结论</span>
                <span class="chip amber">待做事项</span>
                <span class="chip red">风险/卡点</span>
                <span class="chip">下一步</span>
              </div>
            </div>
            <textarea id="aiPrompt" readonly></textarea>
          </div>
        </article>
      </section>
    </main>

    <div class="bottom">
      <div class="bottom-inner">
        <p id="bottomHint">随手记，系统帮你整理。</p>
        <button class="primary" id="quickCapture">去记录</button>
      </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    const STORAGE_KEY = "systemizedDashboardMvp";
    const stages = [
      { title: "初始化目标", meta: "把现在要做的事说清楚", detail: "先写清楚你现在到底在推进什么。可以是求职、找副业、做项目、学习一个技能。", action: "记录：目标、限制条件、你最想得到的结果。" },
      { title: "收集原始信息", meta: "把想法和素材都堆进来", detail: "不要整理，先记。岗位信息、项目案例、用户原话、链接、想法、犹豫都可以丢进来。", action: "记录：你看见了什么、听见了什么、想到什么。" },
      { title: "提炼结论", meta: "把混乱压成几条判断", detail: "让 AI 或你自己把记录压成已确认结论、候选方向、风险和下一步。", action: "整理：哪些判断已经比较确定，哪些还只是感觉。" },
      { title: "执行验证", meta: "做一个最小动作试一下", detail: "从候选方向里挑一个最值得的，做一个最小验证动作。求职可以是投递、约面、改简历；副业可以是小范围测试。", action: "下一步：做一件能验证真假的小动作。" }
    ];

    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || {
      notes: [],
      projectLabel: "求职 / 副业 / 项目"
    };

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
    }

    function getStageIndex() {
      const total = state.notes.length;
      if (total === 0) return 0;
      if (total < 3) return 1;
      if (total < 6) return 2;
      return 3;
    }

    function getActions() {
      const notes = [...state.notes].reverse();
      const actions = [];
      if (!notes.length) actions.push("先写一条你正在做的事。");
      if (notes.length < 3) actions.push("继续补记录：现在做了什么、想到什么、卡在哪里。");
      if (notes.length >= 3) actions.push("让 AI 把这些记录整理成结论和下一步。");
      if (notes.length >= 6) actions.push("挑一条最重要的下一步开始执行。");
      return actions.slice(0, 3);
    }

    function renderDashboard() {
      const stageIndex = getStageIndex();
      const stage = stages[stageIndex];
      const progress = Math.round(((stageIndex + 1) / stages.length) * 100);
      document.getElementById("progressRing").style.setProperty("--angle", (progress * 3.6) + "deg");
      document.getElementById("progressText").textContent = progress + "%";
      document.getElementById("currentGoal").textContent = "当前进度：" + stage.title;
      document.getElementById("currentSummary").textContent = stage.meta + "。";
      document.getElementById("noteCount").textContent = state.notes.length;
      document.getElementById("actionCount").textContent = getActions().length;
      document.getElementById("stageCount").textContent = stageIndex + 1;

      const stageList = document.getElementById("stageList");
      stageList.innerHTML = "";
      stages.forEach((item, index) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "step " + (index < stageIndex ? "" : index === stageIndex ? "active" : "pending");
        row.innerHTML = `
          <div class="dot">${index < stageIndex ? "✓" : index + 1}</div>
          <div>
            <div class="step-title">${item.title}</div>
            <div class="step-meta">${item.meta}</div>
            <div class="small" style="display:none; margin-top:6px;">${item.detail}<br>${item.action}</div>
          </div>
          <span class="chip ${index === stageIndex ? "green" : ""}">${index < stageIndex ? "已过" : index === stageIndex ? "当前" : "待做"}</span>
        `;
        row.addEventListener("click", () => {
          const extra = row.querySelector(".small");
          const shown = extra.style.display === "block";
          extra.style.display = shown ? "none" : "block";
        });
        stageList.appendChild(row);
      });

      const focusList = document.getElementById("focusList");
      focusList.innerHTML = "";
      getActions().forEach((text, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>${index + 1}. ${escapeHtml(text)}</h3>`;
        focusList.appendChild(card);
      });
      if (!focusList.children.length) {
        focusList.innerHTML = `<div class="empty">还没有重点，先记录一点内容。</div>`;
      }

      const prompt = `你是我的系统化事项整理助手。请基于下面的原始记录，输出一个简洁驾驶舱。

要求：
1. 只输出：当前进度、已确定结论、待做事项、风险/卡点、下一步。
2. 不要复述全部原始记录。
3. 如果信息不足，告诉我下一条最该记录什么。
4. 下一步最多 3 条，必须具体可执行。

当前项目：
${state.projectLabel}

原始记录：
${state.notes.length ? state.notes.map((n, i) => `${i + 1}. ${n.text}`).join("\n") : "暂无记录"}`;
      document.getElementById("aiPrompt").value = prompt;
      document.getElementById("projectLabel").textContent = state.projectLabel;
    }

    function renderRecords() {
      const root = document.getElementById("recordList");
      const notes = [...state.notes].reverse();
      if (!notes.length) {
        root.innerHTML = `<div class="empty">还没有历史卡片。先写第一条记录。</div>`;
        return;
      }
      root.innerHTML = "";
      notes.forEach(note => {
        const card = document.createElement("article");
        card.className = "card record note";
        const time = new Date(note.createdAt).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
        card.innerHTML = `
          <div class="record-title">
            <div>
              <h3>记录卡片</h3>
              <p>${time}</p>
            </div>
            <button class="icon-btn" title="删除">×</button>
          </div>
          <p>${escapeHtml(note.text)}</p>
        `;
        card.querySelector("button").addEventListener("click", () => {
          state.notes = state.notes.filter(item => item.id !== note.id);
          save();
          renderAll();
          showToast("已删除");
        });
        root.appendChild(card);
      });
    }

    function renderAi() {
      document.getElementById("aiPrompt").value = document.getElementById("aiPrompt").value;
    }

    function renderAll() {
      renderDashboard();
      renderRecords();
      renderAi();
    }

    function switchView(view) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      document.querySelectorAll(".view").forEach(section => section.classList.toggle("active", section.id === "view-" + view));
      if (view === "capture") renderRecords();
      if (view === "ai") renderAi();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("已复制");
      } catch {
        showToast("复制失败，请手动选择");
      }
    }

    document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => switchView(tab.dataset.view)));
    document.getElementById("quickCapture").addEventListener("click", () => switchView("capture"));
    document.getElementById("noteForm").addEventListener("submit", event => {
      event.preventDefault();
      const text = document.getElementById("noteText").value.trim();
      if (!text) return showToast("先写一点内容");
      state.notes.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        text,
        createdAt: new Date().toISOString()
      });
      save();
      event.target.reset();
      renderAll();
      showToast("已保存成卡片");
      switchView("dash");
    });
    document.getElementById("clearAll").addEventListener("click", () => {
      if (!confirm("确定清空所有记录吗？")) return;
      state.notes = [];
      save();
      renderAll();
      showToast("已清空");
    });
    document.getElementById("copyPrompt").addEventListener("click", () => copyText(document.getElementById("aiPrompt").value));

    save();
    renderAll();
  </script>
</body>
</html>
